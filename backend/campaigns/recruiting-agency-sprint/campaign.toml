# Recruiting Agency Sprint — research-led outreach to boutique recruiting / staffing
# agency founders. LinkedIn-native, AI-curious, fast buyers (they do outreach themselves).
#   uv run python -m scripts.run_pipeline leads.csv --campaign recruiting-agency-sprint

name = "Recruiting Agency Sprint"
slug = "recruiting-agency-sprint"
is_default = false

# Auto-send: approved first-touch openers go out without manual review (fit-gated >=60).
auto_send = true

channels = ["linkedin_connect", "linkedin_dm"]

# Sourcing is driven by the structured Sales-Navigator filters in `search.json`
# (owner/partner seniority @ "Staffing and Recruiting", US, 1-200 employees) — far
# higher-ICP than a broad keyword URL. The replenish worker prefers search_params over
# search_url, so we leave search_url unset.
# search_url = '...'  # legacy broad keyword search, superseded by search.json

inmail_min_fit = 85
