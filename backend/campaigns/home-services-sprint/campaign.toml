# Home Services Sprint — research-led outreach to owner-operated home-services
# companies (HVAC, plumbing, electrical, roofing, landscaping). The productized
# SMB agent-implementation play: curiosity-first touches, productized ladder
# (assessment -> pilot agent -> monthly retainer) surfaces only in replies.
# Target explicitly:
#   uv run python -m scripts.run_pipeline leads.csv --campaign home-services-sprint

name = "Home Services Sprint"
slug = "home-services-sprint"
is_default = false

# Manual review first: approve the first batches in /drafts to validate the voice
# against this ICP, then flip to true once the notes read right.
auto_send = false

# LinkedIn-only until the email deliverability audit lands (753 email sends ran
# 0.5% reply / all-negative — almost certainly spam-foldered). To add email later:
# drop an apollo.json in this folder and add "email" here, then re-sync.
channels = ["linkedin_connect", "linkedin_dm"]

# Sourcing via structured CLASSIC search filters in `search.json` (trade keywords
# @ Construction + Facilities Services industries, US). Classic, not sales_navigator:
# the Unipile plan 403s the Sales Nav search API (feature_not_subscribed) as of
# 2026-07 — classic has no seniority/headcount filters, so the ICP scorer does that
# gating. Switch back to sales_navigator params if the Unipile feature is enabled.

# Top-fit owners get a cold InMail (Sales Nav credit) instead of a connect request.
inmail_min_fit = 85
